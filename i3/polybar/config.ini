[colors]
background = #00000000
text_color = #00FFFF
border_color = #79238C

[bar/main]
offset-x = 1%
offset-y = 1%
width = 2.5%
radius = 6
background = ${colors.background}

border-size = 1pt 
border-color = ${colors.border_color}

override-redirect = true
module-margin = 1

padding-left =  1 
font-0 = GeistMono Nerd Font Mono;2

modules-left = launcher 

[module/launcher]
type = custom/script
tail = true
exec = echo "󰣇"
click-left = rofi -show drun


[bar/workspace]
offset-x = 5%
offset-y = 1%
width = 20%
line-size = 3pt


background = ${colors.background}

border-size = 1pt 
border-color = ${colors.border_color}

override-redirect = true
module-margin = 1

padding-left =  0
padding-right = 1 
font-0 = Adwaita Mono;1

separator = "|" 
modules-left = workspace window 


[module/workspace]
type = internal/i3
label-focused-foreground = #75188F
label-unfocused-foreground = #9B9CC7
lable-urgent-foreground = #A422C1

[module/window]
type = internal/xwindow 
format = <label>
label-maxlen = 75

[bar/player]
offset-x = 63%
offset-y = 1%
width = 20%
line-size = 3pt
enable-ipc = true

background = ${colors.background}

border-size = 1pt 
border-color = ${colors.border_color}

override-redirect = true
module-margin = 1

padding-left =  1 
padding-right = 1 
font-0 = GeistMono Nerd Font;1

separator = "|" 
modules-left = pause_play title 

[module/title]
type = custom/ipc 
hook-0 = bash ~/.config/polybar/get_title
label = %output% 

[module/pause_play]
type = custom/ipc
hook-0 = ~/.config/polybar/playerct.sh
click-left = bash ~/.config/polybar/playerct.sh -t && polybar-msg action "#pause_play.hook.0" && polybar-msg action "#title.hook.0"
label = %output%


[bar/systray]
offset-x = 84%
offset-y = 1%
width = 15%
line-size = 3pt
enable-ipc = true

background = ${colors.background}

border-size = 1pt 
border-color = ${colors.border_color}

override-redirect = true
module-margin = 1

padding-left =  1 
padding-right = 1 
font-0 = GeistMono Nerd Font;1

separator = "|" 
modules-left = time memory tray  

[module/time]
type = internal/date
interval = 1 

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%

[module/memory]
type = internal/memory
label = "󰍛 %percentage_used%%"
interval = 3
warn-percentage = 95

[module/tray]
type = internal/tray

format-margin = 8px
tray-spacing = 8px
